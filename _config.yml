title:            Oliver Barreto's Build One IDeas
description:      Bringing Ideas to life with my own OneIDeas
logo:             site-logo.png
disqus_shortname: "oliverbarretosbuildoneideas"
search:           true
#Change url to your domain. Leave localhost server or blank when working locally.
#url:              http://localhost:4000
url:              http://oliverbarreto.com

# Owner/author information
owner:
  name:           Oliver Barreto
  avatar:         bio-photo.jpg
  email:          oliver.barreto.online@gmail.com
  # Social networking links used in footer. Update and remove as you like.
  twitter:        "oliverbarreto"
  facebook:       "oliverbarretorodriguez"
  github:         "oliverbarreto"
  stackexchange:  
  linkedin:       "oliverbarreto"
  instagram:      "oliverbarreto"
  flickr:         "oliverbarreto"
  tumblr:         
  # For Google Authorship https://plus.google.com/authorship
  google_plus:    "http://plus.google.com/109194913708916482599"

# Analytics and webmaster tools stuff goes here
google_analytics: UA-46702055-1  
google_verify:      
# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:         

# Links to include in top navigation
# For external links add external: true
links:
  - title: About
    url: /about
  - title: Blog
    url: /blog
  - title: OneIDeas
    url: /oneideas
#  - title: Made Mistakes
#    url: http://mademistakes.com
#    external: true

# http://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone:    Atlantic/Canary
future:      true
pygments:    true
markdown:    kramdown

# https://github.com/mojombo/jekyll/wiki/Permalinks
permalink:   /:categories/:title

kramdown:
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  use_coderay: false

  coderay:
    coderay_line_numbers: 
    coderay_line_numbers_start: 1
    coderay_tab_width: 4
    coderay_bold_every: 10
    coderay_css: class

include: [".htaccess"]
exclude: ["lib", "config.rb", "Gemfile", "Capfile", "Gemfile.lock", "config", "log", "Rakefile", "Rakefile.rb", "tmp", "less", "*.sublime-project", "*.sublime-workspace", "test", "spec", "Gruntfile.js", "package.json", "node_modules"]
